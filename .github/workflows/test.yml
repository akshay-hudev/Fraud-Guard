name: Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Suite (Python 3.11)
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend/ training/src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend/ training/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check imports with isort
      run: |
        pip install isort
        isort --check-only backend/ training/src
      continue-on-error: true
    
    - name: Format check with black
      run: |
        pip install black
        black --check backend/ training/src
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy backend/main.py backend/monitoring.py --ignore-missing-imports
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        pytest training/tests/ -v --tb=short
    
    - name: Test API endpoints
      run: |
        python -m pytest tests/ -v --tb=short || true
    
    - name: Generate coverage report
      run: |
        pytest --cov=backend --cov=training/src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Verify Monitoring Integration
      run: |
        python -c "
        import sys
        try:
            from backend.monitoring import MetricsCollector, registry
            from backend.main import app
            print('✓ Monitoring module imports correctly')
            print(f'✓ Registry initialized: {registry is not None}')
            print('✓ MetricsCollector available with all methods')
            sys.exit(0)
        except Exception as e:
            print(f'✗ Monitoring import failed: {e}')
            sys.exit(1)
        "

  security:
    runs-on: ubuntu-latest
    name: Security Checks
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Bandit security check
      run: |
        bandit -r backend/ training/src -ll
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build API Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.api
        push: false
        tags: fraud-detection-api:test
    
    - name: Build Frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.frontend
        push: false
        tags: fraud-detection-frontend:test
